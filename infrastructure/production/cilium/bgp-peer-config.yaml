---
# BGP peer configuration shared by all nodes.
# Ubiquiti router: ASN 65100 at 172.20.10.1
apiVersion: cilium.io/v2
kind: CiliumBGPPeerConfig
metadata:
  name: homelab-peer-config
spec:
  authSecretRef: bgp-peer-password
  gracefulRestart:
    enabled: true
  families:
    - afi: ipv4
      safi: unicast
      advertisements:
        matchLabels:
          bgp.cilium.io/advertise: loadbalancer-services
