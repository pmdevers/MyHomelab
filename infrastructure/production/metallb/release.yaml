apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb
spec:
  releaseName: metallb
  chart:
    spec:
      chart: metallb
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: flux-system
      version: "0.15.x"
  values:
    speaker:
      ignoreExcludeLB: true
  interval: 48h0m0s
  install:
    remediation:
      retries: 3