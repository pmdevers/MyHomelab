apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: amd-gpu-operator
  namespace: kube-amd-gpu
spec:
  interval: 30m
  releaseName: amd-gpu-operator
  chart:
    spec:
      chart: gpu-operator-charts
      version: "v1.4.1"
      sourceRef:
        kind: HelmRepository
        name: rocm
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
