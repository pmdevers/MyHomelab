apiVersion: v1
kind: ConfigMap
metadata:
  name: jellyfin-maintenance-scripts
  namespace: jellyfin
data:
  menu.sh: |
    #!/bin/sh
    set -eu

    while true; do
      echo
      echo "Jellyfin maintenance menu"
      echo "1) P0 convert ISO/BDMV"
      echo "2) P1 remux movie folder(s)"
      echo "3) P2 fix subtitle defaults"
      echo "4) P3 transcode audio"
      echo "5) P4 transcode video"
      echo "6) Detect playback issues"
      echo "7) Auto-fix playback issues"
      echo "8) Open shell"
      echo "9) Exit"
      printf "Select an option: "
      IFS= read -r choice || exit 0

      case "$choice" in
        1)
          printf "Enter ISO or BDMV path(s), separated by | : "
          IFS= read -r sources || continue
          if [ -z "$sources" ]; then
            echo "[skip] No sources provided"
            continue
          fi
          OLD_IFS="$IFS"
          IFS='|'
          set -- $sources
          IFS="$OLD_IFS"
          /maintenance/p0-makemkv.sh "$@"
          ;;
        2)
          if ! command -v ffmpeg >/dev/null 2>&1; then
            echo "[skip] ffmpeg is not available in this container"
            continue
          fi
          printf "Enter movie folder name(s), separated by | : "
          IFS= read -r titles || continue
          if [ -z "$titles" ]; then
            echo "[skip] No titles provided"
            continue
          fi
          OLD_IFS="$IFS"
          IFS='|'
          set -- $titles
          IFS="$OLD_IFS"
          /maintenance/p1-remux.sh "$@"
          ;;
        3)
          if ! command -v mkvmerge >/dev/null 2>&1; then
            echo "[skip] mkvtoolnix is not available in this container"
            continue
          fi
          printf "Scan path [/movies]: "
          IFS= read -r scan_root || true
          scan_root="${scan_root:-/movies}"
          /maintenance/p2-subtitle-defaults.sh "$scan_root"
          ;;
        4)
          printf "Scan path [/movies]: "
          IFS= read -r scan_root || true
          scan_root="${scan_root:-/movies}"
          /maintenance/p3-transcode-audio.sh "$scan_root"
          ;;
        5)
          printf "Scan path [/movies]: "
          IFS= read -r scan_root || true
          scan_root="${scan_root:-/movies}"
          /maintenance/p4-transcode-video.sh "$scan_root"
          ;;
        6)
          printf "Scan path [/movies]: "
          IFS= read -r scan_root || true
          scan_root="${scan_root:-/movies}"
          /maintenance/detect-playback-issues.sh "$scan_root"
          ;;
        7)
          printf "Scan path [/movies]: "
          IFS= read -r scan_root || true
          scan_root="${scan_root:-/movies}"
          /maintenance/auto-fix-playback-issues.sh "$scan_root"
          ;;
        8)
          return 0 2>/dev/null || exit 0
          ;;
        9)
          exit 0
          ;;
        *)
          echo "[skip] Invalid option"
          ;;
      esac
    done
  shrc.sh: |
    #!/bin/sh
    case "${JELLYFIN_MAINTENANCE_MENU_SHOWN:-}" in
      1)
        return 0 2>/dev/null || exit 0
        ;;
    esac

    export JELLYFIN_MAINTENANCE_MENU_SHOWN=1

    if [ -t 0 ] && [ -t 1 ] && [ -x /maintenance/menu.sh ]; then
      /maintenance/menu.sh
    fi

  bootstrap.sh: |
    #!/bin/sh
    set -eu

    install_missing_tools() {
      need_ffmpeg=0
      need_mkvtoolnix=0

      command -v ffmpeg >/dev/null 2>&1 || need_ffmpeg=1
      command -v mkvmerge >/dev/null 2>&1 || need_mkvtoolnix=1

      if [ "$need_ffmpeg" -eq 0 ] && [ "$need_mkvtoolnix" -eq 0 ]; then
        return
      fi

      if command -v apk >/dev/null 2>&1; then
        apk add --no-cache ffmpeg mkvtoolnix
        return
      fi

      if command -v apt-get >/dev/null 2>&1; then
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get install -y ffmpeg mkvtoolnix
        rm -rf /var/lib/apt/lists/*
        return
      fi

      echo "[warn] Could not install ffmpeg/mkvtoolnix automatically"
    }

    install_missing_tools

    if ! command -v makemkvcon >/dev/null 2>&1 && [ ! -x /opt/makemkv/bin/makemkvcon ]; then
      echo "[warn] MakeMKV binary not found in container"
    fi

    while true; do
      sleep 3600
    done

  p0-makemkv.sh: |
    #!/bin/sh
    set -eu

    if [ "$#" -eq 0 ]; then
      echo "usage: p0-makemkv.sh <iso-or-bdmv-path> [iso-or-bdmv-path...]"
      exit 1
    fi

    find_makemkv() {
      if command -v makemkvcon >/dev/null 2>&1; then
        command -v makemkvcon
        return
      fi
      if [ -x /opt/makemkv/bin/makemkvcon ]; then
        echo /opt/makemkv/bin/makemkvcon
        return
      fi
      echo ""
    }

    makemkv_bin="$(find_makemkv)"
    if [ -z "$makemkv_bin" ]; then
      echo "[fail] MakeMKV binary not found"
      exit 1
    fi

    convert_source() {
      input="$1"
      lower="$(printf '%s' "$input" | tr '[:upper:]' '[:lower:]')"

      case "$lower" in
        *.iso)
          source="$input"
          title_dir="$(dirname "$input")"
          cleanup_target="$input"
          ;;
        */bdmv)
          source="$input"
          title_dir="$(dirname "$input")"
          cleanup_target="$input"
          ;;
        *)
          echo "[skip] Unsupported MakeMKV source: $input"
          return
          ;;
      esac

      if [ ! -e "$source" ]; then
        echo "[skip] Missing source: $source"
        return
      fi

      title="$(basename "$title_dir")"
      out="$title_dir/$title.mkv"
      if [ -f "$out" ]; then
        echo "[skip] Output already exists: $out"
        return
      fi

      tmp_dir="$title_dir/.makemkv-tmp"
      tmp_list="$(mktemp)"
      largest=""
      largest_size=0

      rm -rf "$tmp_dir"
      mkdir -p "$tmp_dir"

      echo "[run] $source -> $out"
      if ! "$makemkv_bin" mkv "file:$source" all "$tmp_dir"; then
        echo "[fail] MakeMKV conversion failed: $source"
        rm -rf "$tmp_dir"
        rm -f "$tmp_list"
        return
      fi

      find "$tmp_dir" -type f -iname '*.mkv' -print > "$tmp_list"
      while IFS= read -r candidate; do
        [ -n "$candidate" ] || continue
        size="$(wc -c < "$candidate" | tr -d '[:space:]')"
        if [ "$size" -gt "$largest_size" ]; then
          largest="$candidate"
          largest_size="$size"
        fi
      done < "$tmp_list"

      rm -f "$tmp_list"

      if [ -z "$largest" ]; then
        echo "[fail] No MKV output produced for: $source"
        rm -rf "$tmp_dir"
        return
      fi

      mv -f "$largest" "$out"
      rm -rf "$tmp_dir"
      rm -rf "$cleanup_target"
      echo "[ok] Created: $out"
      echo "[ok] Removed source: $cleanup_target"
    }

    for source in "$@"; do
      convert_source "$source"
    done

  p1-remux.sh: |
    #!/bin/sh
    set -eu

    if [ "$#" -eq 0 ]; then
      echo "usage: p1-remux.sh <movie-folder-or-path> [movie-folder-or-path...]"
      exit 1
    fi

    remux_title() {
      input="$1"
      case "$input" in
        /*)
          dir="$input"
          ;;
        *)
          dir="/movies/$input"
          ;;
      esac

      title="$(basename "$dir")"

      if [ ! -d "$dir" ]; then
        echo "[skip] Missing folder: $dir"
        return
      fi

      src="$(find "$dir" -maxdepth 2 -type f \( -iname '*.m2ts' -o -iname '*.ts' \) -print | head -n 1)"
      if [ -z "$src" ]; then
        echo "[skip] No ts/m2ts source found in: $dir"
        return
      fi

      out="$dir/$title.mkv"
      if [ -f "$out" ]; then
        echo "[skip] Output already exists: $out"
        return
      fi

      tmp="$dir/.remux.tmp.mkv"
      echo "[run] $src -> $out"
      ffmpeg -hide_banner -loglevel error -y -i "$src" -map 0 -c copy "$tmp"
      mv -f "$tmp" "$out"
      echo "[ok] Created: $out"
    }

    for title in "$@"; do
      remux_title "$title"
    done
  p2-subtitle-defaults.sh: |
    #!/bin/sh
    set -eu

    root="${1:-/movies}"
    echo "[info] P2 subtitle-default fixer start on $root"

    find "$root" -type f -iname '*.mkv' -print0 | while IFS= read -r -d '' f; do
      text_idx=""
      img_idxs=""
      info="$(mkvmerge -i "$f" 2>/dev/null || true)"

      if [ -z "$info" ]; then
        echo "[skip] Could not inspect: $f"
        continue
      fi

      text_idx="$(printf '%s\n' "$info" | awk 'BEGIN{c=0;t=0} /subtitles \(/ {c++; l=tolower($0); if(t==0 && l ~ /subrip|s_text|ssa|ass|webvtt|utf-8|utf8|usf|mov_text/) t=c} END{if(t>0) print t}')"
      img_idxs="$(printf '%s\n' "$info" | awk 'BEGIN{c=0} /subtitles \(/ {c++; l=tolower($0); if(l ~ /pgs|hdmv|vobsub|dvd|dvb/) printf c " "}')"

      if [ -z "$text_idx" ] || [ -z "$(echo "$img_idxs" | xargs)" ]; then
        continue
      fi

      ok=1
      for idx in $img_idxs; do
        if ! mkvpropedit "$f" --edit "track:s$idx" --set flag-default=0 >/dev/null 2>&1; then
          ok=0
        fi
      done
      if ! mkvpropedit "$f" --edit "track:s$text_idx" --set flag-default=1 >/dev/null 2>&1; then
        ok=0
      fi

      if [ "$ok" -eq 1 ]; then
        echo "[fixed] $f"
      else
        echo "[fail] $f"
      fi
    done

    echo "[info] P2 subtitle-default fixer end"
  p3-transcode-audio.sh: |
    #!/bin/sh
    set -eu

    root="${1:-/movies}"
    tmp_files="$(mktemp)"
    fixed=0
    skipped=0

    cleanup() {
      rm -f "$tmp_files"
    }
    trap cleanup EXIT INT TERM

    if ! command -v ffmpeg >/dev/null 2>&1; then
      echo "[fail] ffmpeg is not available in this container"
      exit 1
    fi

    echo "[info] P3 audio transcode start on $root"

    find "$root" -type f \( -iname '*.mkv' -o -iname '*.mp4' -o -iname '*.avi' \) -print > "$tmp_files"

    while IFS= read -r file; do
      [ -n "$file" ] || continue

      audio_codecs="$(ffprobe -v error -select_streams a -show_entries stream=codec_name -of csv=p=0 "$file" 2>/dev/null || true)"
      audio_lc="$(printf '%s' "$audio_codecs" | tr '[:upper:]' '[:lower:]')"

      case "$audio_lc" in
        *truehd*|*dts*|*flac*|*pcm_*|*mlp*)
          ;;
        *)
          skipped=$((skipped + 1))
          continue
          ;;
      esac

      dir="$(dirname "$file")"
      base="$(basename "$file")"
      name="${base%.*}"
      ext="${base##*.}"
      tmp_out="$dir/.${name}.p3fix.mkv"
      final_out="$dir/$name.mkv"

      if [ -f "$final_out" ] && [ "$ext" = "mkv" ]; then
        echo "[skip] Output already exists: $final_out"
        skipped=$((skipped + 1))
        continue
      fi

      if [ -f "$final_out" ] && [ "$ext" != "mkv" ]; then
        echo "[skip] Target already exists, leaving source in place: $final_out"
        skipped=$((skipped + 1))
        continue
      fi

      echo "[run] $file -> $final_out"
      if ! ffmpeg -hide_banner -loglevel error -y -i "$file" -map 0 -c:v copy -c:s copy -c:t copy -c:a ac3 -b:a 640k "$tmp_out"; then
        echo "[fail] Audio transcode failed: $file"
        rm -f "$tmp_out"
        continue
      fi

      mv -f "$tmp_out" "$final_out"
      if [ "$ext" != "mkv" ]; then
        rm -f "$file"
      fi
      fixed=$((fixed + 1))
      echo "[ok] Created: $final_out"
    done < "$tmp_files"

    echo "[summary] fixed=$fixed skipped=$skipped"
    echo "[info] P3 audio transcode end"
  p4-transcode-video.sh: |
    #!/bin/sh
    set -eu

    root="${1:-/movies}"
    tmp_files="$(mktemp)"
    fixed=0
    skipped=0

    cleanup() {
      rm -f "$tmp_files"
    }
    trap cleanup EXIT INT TERM

    if ! command -v ffmpeg >/dev/null 2>&1; then
      echo "[fail] ffmpeg is not available in this container"
      exit 1
    fi

    echo "[info] P4 video transcode start on $root"

    find "$root" -type f \( -iname '*.mkv' -o -iname '*.mp4' -o -iname '*.avi' \) -print > "$tmp_files"

    while IFS= read -r file; do
      [ -n "$file" ] || continue

      bitrate="$(ffprobe -v error -show_entries format=bit_rate -of default=nokey=1:noprint_wrappers=1 "$file" 2>/dev/null | tr -d '\r' | head -n 1)"
      if [ -z "$bitrate" ] || [ "$bitrate" -lt 40000000 ] 2>/dev/null; then
        skipped=$((skipped + 1))
        continue
      fi

      dir="$(dirname "$file")"
      base="$(basename "$file")"
      name="${base%.*}"
      tmp_out="$dir/.${name}.p4fix.mkv"
      final_out="$dir/$name.mkv"

      echo "[run] $file -> $final_out"
      if ! ffmpeg -hide_banner -loglevel error -y -i "$file" -map 0 -c:v libx264 -preset medium -crf 21 -pix_fmt yuv420p -c:a aac -b:a 192k -c:s copy -c:t copy "$tmp_out"; then
        echo "[fail] Video transcode failed: $file"
        rm -f "$tmp_out"
        continue
      fi

      mv -f "$tmp_out" "$final_out"
      if [ "${base##*.}" != "mkv" ]; then
        rm -f "$file"
      fi
      fixed=$((fixed + 1))
      echo "[ok] Created: $final_out"
    done < "$tmp_files"

    echo "[summary] fixed=$fixed skipped=$skipped"
    echo "[info] P4 video transcode end"
  auto-fix-playback-issues.sh: |
    #!/bin/sh
    set -eu

    root="${1:-/movies}"
    tmp_bdmv="$(mktemp)"
    tmp_iso="$(mktemp)"
    tmp_p0_sources="$(mktemp)"
    tmp_stream_dirs="$(mktemp)"
    tmp_stream_dirs_unique="$(mktemp)"
    tmp_media="$(mktemp)"
    fixed_p0=0
    fixed_p1=0
    fixed_p3=0
    fixed_p4=0
    manual_p3=0
    manual_p4=0

    cleanup() {
      rm -f "$tmp_bdmv" "$tmp_iso" "$tmp_p0_sources" "$tmp_stream_dirs" "$tmp_stream_dirs_unique" "$tmp_media"
    }
    trap cleanup EXIT INT TERM

    echo "[info] Auto-fix playback issues start on $root"

    find "$root" -type d -iname BDMV -print > "$tmp_bdmv"
    while IFS= read -r bdmv; do
      [ -n "$bdmv" ] || continue
      printf '%s\n' "$bdmv" >> "$tmp_p0_sources"
    done < "$tmp_bdmv"

    find "$root" -type f -iname '*.iso' -print > "$tmp_iso"
    while IFS= read -r iso; do
      [ -n "$iso" ] || continue
      printf '%s\n' "$iso" >> "$tmp_p0_sources"
    done < "$tmp_iso"

    while IFS= read -r source; do
      [ -n "$source" ] || continue
      if /maintenance/p0-makemkv.sh "$source"; then
        fixed_p0=$((fixed_p0 + 1))
      fi
    done < "$tmp_p0_sources"

    find "$root" -type f \( -iname '*.m2ts' -o -iname '*.ts' \) -exec dirname {} \; > "$tmp_stream_dirs"
    sort -u "$tmp_stream_dirs" > "$tmp_stream_dirs_unique"

    while IFS= read -r dir; do
      [ -n "$dir" ] || continue
      /maintenance/p1-remux.sh "$dir"
      fixed_p1=$((fixed_p1 + 1))
    done < "$tmp_stream_dirs_unique"

    /maintenance/p2-subtitle-defaults.sh "$root"

    find "$root" -type f \( -iname '*.mkv' -o -iname '*.mp4' -o -iname '*.avi' \) -print > "$tmp_media"

    while IFS= read -r file; do
      [ -n "$file" ] || continue
      audio_codecs="$(ffprobe -v error -select_streams a -show_entries stream=codec_name -of csv=p=0 "$file" 2>/dev/null || true)"
      audio_lc="$(printf '%s' "$audio_codecs" | tr '[:upper:]' '[:lower:]')"

      case "$audio_lc" in
        *truehd*|*dts*|*flac*|*pcm_*|*mlp*)
          if /maintenance/p3-transcode-audio.sh "$file"; then
            fixed_p3=$((fixed_p3 + 1))
          fi
          ;;
      esac
    done < "$tmp_media"

    while IFS= read -r file; do
      [ -n "$file" ] || continue
      bitrate="$(ffprobe -v error -show_entries format=bit_rate -of default=nokey=1:noprint_wrappers=1 "$file" 2>/dev/null | tr -d '\r' | head -n 1)"
      if [ -n "$bitrate" ] && [ "$bitrate" -ge 40000000 ] 2>/dev/null; then
        if /maintenance/p4-transcode-video.sh "$file"; then
          fixed_p4=$((fixed_p4 + 1))
        fi
      fi
    done < "$tmp_media"

    while IFS= read -r file; do
      [ -n "$file" ] || continue
      audio_codecs="$(ffprobe -v error -select_streams a -show_entries stream=codec_name -of csv=p=0 "$file" 2>/dev/null || true)"
      bitrate="$(ffprobe -v error -show_entries format=bit_rate -of default=nokey=1:noprint_wrappers=1 "$file" 2>/dev/null | tr -d '\r' | head -n 1)"
      audio_lc="$(printf '%s' "$audio_codecs" | tr '[:upper:]' '[:lower:]')"

      case "$audio_lc" in
        *truehd*|*dts*|*flac*|*pcm_*|*mlp*)
          manual_p3=$((manual_p3 + 1))
          echo "[manual][P3][audio] $file | codec conversion not automated: $audio_codecs"
          ;;
      esac

      if [ -n "$bitrate" ] && [ "$bitrate" -ge 40000000 ] 2>/dev/null; then
        manual_p4=$((manual_p4 + 1))
        mbps=$((bitrate / 1000000))
        echo "[manual][P4][bitrate] $file | consider a lighter encode or client-side limit: ${mbps} Mbps"
      fi
    done < "$tmp_media"

    echo "[summary] fixed_p0=$fixed_p0 fixed_p1=$fixed_p1 fixed_p2=path-scan fixed_p3=$fixed_p3 fixed_p4=$fixed_p4 manual_p4=$manual_p4"
    echo "[info] Auto-fix playback issues end"
  detect-playback-issues.sh: |
    #!/bin/sh
    set -eu

    root="${1:-/movies}"
    tmp_files="$(mktemp)"
    tmp_bdmv="$(mktemp)"
    total=0
    issues=0
    p0=0
    p1=0
    p2=0
    p3=0
    p4=0

    cleanup() {
      rm -f "$tmp_files" "$tmp_bdmv"
    }
    trap cleanup EXIT INT TERM

    echo "[info] Playback issue scan start on $root"

    find "$root" -type d -iname BDMV -print > "$tmp_bdmv"
    while IFS= read -r bdmv; do
      [ -n "$bdmv" ] || continue
      issues=$((issues + 1))
      p0=$((p0 + 1))
      echo "[P0][bdmv] $bdmv"
    done < "$tmp_bdmv"

    find "$root" -type f \( -iname '*.mkv' -o -iname '*.mp4' -o -iname '*.avi' -o -iname '*.iso' -o -iname '*.m2ts' -o -iname '*.ts' \) -print > "$tmp_files"

    while IFS= read -r file; do
      [ -n "$file" ] || continue
      total=$((total + 1))

      lower="$(printf '%s' "$file" | tr '[:upper:]' '[:lower:]')"

      case "$lower" in
        *.iso)
          issues=$((issues + 1))
          p0=$((p0 + 1))
          echo "[P0][iso] $file"
          continue
          ;;
        *.m2ts|*.ts)
          issues=$((issues + 1))
          p1=$((p1 + 1))
          echo "[P1][container] $file | raw transport stream, remux to mkv"
          continue
          ;;
      esac

      subtitle_codecs="$(ffprobe -v error -select_streams s -show_entries stream=codec_name -of csv=p=0 "$file" 2>/dev/null || true)"
      audio_codecs="$(ffprobe -v error -select_streams a -show_entries stream=codec_name -of csv=p=0 "$file" 2>/dev/null || true)"
      bitrate="$(ffprobe -v error -show_entries format=bit_rate -of default=nokey=1:noprint_wrappers=1 "$file" 2>/dev/null | tr -d '\r' | head -n 1)"

      has_text_sub=0
      has_image_sub=0
      if [ -n "$subtitle_codecs" ]; then
        printf '%s\n' "$subtitle_codecs" | while IFS= read -r codec; do
          :
        done >/dev/null 2>&1 || true
        case "$(printf '%s' "$subtitle_codecs" | tr '[:upper:]' '[:lower:]')" in
          *subrip*|*ass*|*ssa*|*webvtt*|*mov_text*)
            has_text_sub=1
            ;;
        esac
        case "$(printf '%s' "$subtitle_codecs" | tr '[:upper:]' '[:lower:]')" in
          *hdmv_pgs_subtitle*|*dvd_subtitle*|*xsub*|*dvb_subtitle*|*vobsub*)
            has_image_sub=1
            ;;
        esac
      fi

      if [ "$has_image_sub" -eq 1 ] && [ "$has_text_sub" -eq 0 ]; then
        issues=$((issues + 1))
        p2=$((p2 + 1))
        echo "[P2][subtitles] $file | image subtitles only, likely subtitle-triggered transcoding"
      fi

      audio_lc="$(printf '%s' "$audio_codecs" | tr '[:upper:]' '[:lower:]')"
      case "$audio_lc" in
        *truehd*|*dts*|*flac*|*pcm_*|*mlp*)
          issues=$((issues + 1))
          p3=$((p3 + 1))
          echo "[P3][audio] $file | high-risk client audio codec(s): $audio_codecs"
          ;;
      esac

      if [ -n "$bitrate" ] && [ "$bitrate" -ge 40000000 ] 2>/dev/null; then
        mbps=$((bitrate / 1000000))
        issues=$((issues + 1))
        p4=$((p4 + 1))
        echo "[P4][bitrate] $file | ${mbps} Mbps direct-play risk"
      fi
    done < "$tmp_files"

    echo "[summary] scanned=$total issues=$issues p0=$p0 p1=$p1 p2=$p2 p3=$p3 p4=$p4"
    echo "[info] Playback issue scan end"
