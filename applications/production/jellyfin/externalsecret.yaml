apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jellyfin-db-credentials
  namespace: jellyfin
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: jellyfin-db-credentials
    template:
      data:
        CONNECTION_STRING: |
          Host={{ .host }};Port={{ .port }};Database={{ .database }};Username={{ .username }};Password={{ .password }};
  data:
    - secretKey: host
      remoteRef:
        key: jellyfin-postgres
        property: host
    - secretKey: port
      remoteRef:
        key: jellyfin-postgres
        property: port
    - secretKey: database
      remoteRef:
        key: jellyfin-postgres
        property: database
    - secretKey: username
      remoteRef:
        key: jellyfin-postgres
        property: username
    - secretKey: password
      remoteRef:
        key: jellyfin-postgres
        property: password
