apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-config
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  nfs:
    server: 172.20.10.2
    path: /volume1/config
  mountOptions:
    - nfsvers=4.1
    - hard
    - nolock
    - async
    - noacl
    - nocto
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-config
  namespace: jellyfin
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: nfs-config
  resources:
    requests:
      storage: 1Ti

