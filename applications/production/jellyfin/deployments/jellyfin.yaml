apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
        app.kubernetes.io/part-of: jellyfin
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-node-2
      initContainers:
      - name: migrate-db
        image: alpine:latest
        command:
        - sh
        - -c
        - |
          apk add --no-cache sqlite >/dev/null 2>&1

          # Migrate from NFS on first run
          if [ -z "$(ls -A /data 2>/dev/null)" ]; then
            echo "Migrating Jellyfin data from NFS to local storage..."
            cp -r /nfs-data/. /data/
          fi

          # Remove WAL/SHM files (cause NFS corruption)
          echo "Removing WAL/SHM files..."
          find /data \( -name "*.db-wal" -o -name "*.db-shm" \) -delete

          # Jellyfin 10.10+ stores the db at $JELLYFIN_DATA_DIR/data/jellyfin.db
          DB="/data/data/jellyfin.db"
          mkdir -p "$(dirname $DB)"

          # Remove DB if corrupted (bad SQLite header)
          if [ -f "$DB" ]; then
            magic=$(head -c 6 "$DB" 2>/dev/null)
            if [ "$magic" != "SQLite" ]; then
              echo "Corrupted database detected, removing..."
              rm -f "$DB"
            fi
          fi

          # Workaround for Jellyfin 10.10.x bug: InternalCodeMigration queries
          # __EFMigrationsHistory before EF Core creates it on fresh databases.
          echo "Ensuring __EFMigrationsHistory table exists..."
          sqlite3 "$DB" "CREATE TABLE IF NOT EXISTS \"__EFMigrationsHistory\" (\"MigrationId\" TEXT NOT NULL CONSTRAINT \"PK___EFMigrationsHistory\" PRIMARY KEY, \"ProductVersion\" TEXT NOT NULL);"
          echo "Init complete."
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config
          mountPath: /nfs-data
          subPath: jellyfin/data
      containers:
      - name: jellyfin
        image: jellyfin/jellyfin:latest
        env:
        - name: PUID
          value: "0"
        - name: PGID
          value: "0"
        - name: TZ
          value: "Europe/Amsterdam"
        - name: JELLYFIN_DATA_DIR
          value: /data
        ports:
        - containerPort: 8096
          name: http
        resources:
          limits:
            gpu.intel.com/i915: 1
            ephemeral-storage: 20Gi
          requests:
            ephemeral-storage: 10Gi
        volumeMounts:
        - name: config
          mountPath: /config
          subPath: jellyfin
        - name: data
          mountPath: /data
        - name: cache
          mountPath: /cache
        - name: movies
          mountPath: /movies
        - name: tv
          mountPath: /tv
        - name: music
          mountPath: /music
        - name: downloads
          mountPath: /downloads
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: nfs-config
      - name: data
        hostPath:
          path: /var/local/jellyfin/data
          type: DirectoryOrCreate
      - name: cache
        emptyDir: {}
      - name: movies
        persistentVolumeClaim:
          claimName: nfs-movies
      - name: tv
        persistentVolumeClaim:
          claimName: nfs-tv
      - name: music
        persistentVolumeClaim:
          claimName: nfs-music
      - name: downloads
        persistentVolumeClaim:
          claimName: nfs-downloads
