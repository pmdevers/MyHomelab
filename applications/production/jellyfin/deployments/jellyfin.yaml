apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
        app.kubernetes.io/part-of: jellyfin
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-node-4
      containers:
      - name: jellyfin
        image: jellyfin/jellyfin:10.11.6
        env:
        - name: PUID
          value: "0"
        - name: PGID
          value: "0"
        - name: TZ
          value: "Europe/Amsterdam"
        - name: JELLYFIN_PublishedServerUrl
          value: "https://jellyfin.patrick-evers.nl"
        ports:
        - containerPort: 8096
          name: http
        resources:
          requests:
            cpu: 1000m
            memory: 3Gi
          limits:
            cpu: 4000m
            memory: 6Gi
        volumeMounts:
        - name: config
          mountPath: /config/config
          subPath: jellyfin_/config
        - name: config
          mountPath: /config/metadata
          subPath: jellyfin_/metadata
        - name: config
          mountPath: /config/plugins
          subPath: jellyfin_/plugins
        - name: config
          mountPath: /config/log
          subPath: jellyfin_/log
        - name: config
          mountPath: /config/data
          subPath: jellyfin_/data
        - name: cache
          mountPath: /cache
        - name: movies
          mountPath: /movies
        - name: tv
          mountPath: /tv
        - name: music
          mountPath: /music
        - name: collections
          mountPath: /collections
        - name: dri
          mountPath: /dev/dri
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: nfs-config
      - name: cache
        hostPath:
          path: /var/lib/jellyfin-cache
          type: DirectoryOrCreate
      - name: movies
        persistentVolumeClaim:
          claimName: nfs-movies
      - name: tv
        persistentVolumeClaim:
          claimName: nfs-tv
      - name: music
        persistentVolumeClaim:
          claimName: nfs-music
      - name: collections
        persistentVolumeClaim:
          claimName: nfs-collections
      - name: dri
        hostPath:
          path: /dev/dri
          type: Directory
