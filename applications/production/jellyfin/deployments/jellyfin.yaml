apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
        app.kubernetes.io/part-of: jellyfin
    spec:
      containers:
      - name: jellyfin
        image: jellyfin/jellyfin:latest
        env:
        - name: PUID
          value: "0"
        - name: PGID
          value: "0"
        - name: TZ
          value: "Europe/Amsterdam"
        ports:
        - containerPort: 8096
          name: http
        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
            gpu.intel.com/i915: 1
          limits:
            cpu: 4000m
            memory: 4Gi
            gpu.intel.com/i915: 1
        volumeMounts:
        - name: config
          mountPath: /config
          subPath: jellyfin
        - name: cache
          mountPath: /cache
        - name: movies
          mountPath: /movies
        - name: tv
          mountPath: /tv
        - name: music
          mountPath: /music
        - name: downloads
          mountPath: /downloads
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: nfs-config
      - name: cache
        emptyDir:
          sizeLimit: 10Gi
      - name: movies
        persistentVolumeClaim:
          claimName: nfs-movies
      - name: tv
        persistentVolumeClaim:
          claimName: nfs-tv
      - name: music
        persistentVolumeClaim:
          claimName: nfs-music
      - name: downloads
        persistentVolumeClaim:
          claimName: nfs-downloads
