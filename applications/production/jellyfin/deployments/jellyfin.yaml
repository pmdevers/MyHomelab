apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
        app.kubernetes.io/part-of: jellyfin
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-node-2
      initContainers:
      - name: migrate-db
        image: busybox:latest
        command:
        - sh
        - -c
        - |
          if [ ! -f /data/jellyfin.db ]; then
            echo "Migrating Jellyfin data from NFS to local storage..."
            cp -r /nfs-data/. /data/
            echo "Removing corrupted WAL/SHM files..."
            find /data -name "*.db-wal" -o -name "*.db-shm" | xargs rm -f
            echo "Migration complete."
          else
            echo "Local data already exists, skipping migration."
          fi
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config
          mountPath: /nfs-data
          subPath: jellyfin/data
      containers:
      - name: jellyfin
        image: jellyfin/jellyfin:latest
        env:
        - name: PUID
          value: "0"
        - name: PGID
          value: "0"
        - name: TZ
          value: "Europe/Amsterdam"
        - name: JELLYFIN_DATA_DIR
          value: /data
        ports:
        - containerPort: 8096
          name: http
        resources:
          limits:
            gpu.intel.com/i915: 1
            ephemeral-storage: 20Gi
          requests:
            ephemeral-storage: 10Gi
        volumeMounts:
        - name: config
          mountPath: /config
          subPath: jellyfin
        - name: data
          mountPath: /data
        - name: cache
          mountPath: /cache
        - name: movies
          mountPath: /movies
        - name: tv
          mountPath: /tv
        - name: music
          mountPath: /music
        - name: downloads
          mountPath: /downloads
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: nfs-config
      - name: data
        hostPath:
          path: /var/local/jellyfin/data
          type: DirectoryOrCreate
      - name: cache
        emptyDir: {}
      - name: movies
        persistentVolumeClaim:
          claimName: nfs-movies
      - name: tv
        persistentVolumeClaim:
          claimName: nfs-tv
      - name: music
        persistentVolumeClaim:
          claimName: nfs-music
      - name: downloads
        persistentVolumeClaim:
          claimName: nfs-downloads
