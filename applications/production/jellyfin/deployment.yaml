apiVersion: apps/v1
kind: Deployment
metadata:
  name: navidrome
  namespace: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: navidrome
  template:
    metadata:
      labels:
        app: navidrome
    spec:
      containers:
      - name: navidrome
        image: deluan/navidrome:latest
        env:
        - name: ND_LOGLEVEL
          value: "info"
        - name: ND_SESSIONTIMEOUT
          value: "24h"
        ports:
        - containerPort: 4533
          name: http
        volumeMounts:
        - name: data
          mountPath: /data
        - name: music
          mountPath: /music
          readOnly: true
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: navidrome-data
      - name: music
        persistentVolumeClaim:
          claimName: nfs-music
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy
  namespace: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: caddy
  template:
    metadata:
      labels:
        app: caddy
    spec:
      containers:
      - name: caddy
        image: caddy:latest
        ports:
        - containerPort: 80
          name: http
        - containerPort: 443
          name: https
        volumeMounts:
        - name: caddyfile
          mountPath: /etc/caddy/Caddyfile
          subPath: Caddyfile
        - name: data
          mountPath: /data
        - name: config
          mountPath: /config
      volumes:
      - name: caddyfile
        hostPath:
          path: c:\sources\private\MyHomelab\applications\production\jellyfin\caddy\Caddyfile
          type: File
      - name: data
        persistentVolumeClaim:
          claimName: caddy-data
      - name: config
        persistentVolumeClaim:
          claimName: caddy-config
